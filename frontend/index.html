<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>deepnest</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header>
      <h1>DEEPNEST</h1>
      <span class="sub">RUST/TAURI — PHASE 6</span>
    </header>

    <main>
      <section class="panel" id="panel-import">
        <h2>01 / IMPORT DXF</h2>
        <div class="row">
          <label for="dxf-path">FILE PATH</label>
          <input id="dxf-path" type="text" spellcheck="false" placeholder="C:\path\to\file.dxf" />
          <label for="import-tolerance">TOLERANCE</label>
          <input id="import-tolerance" type="number" value="0.3" step="0.05" min="0.01" />
          <button id="btn-import">IMPORT</button>
        </div>
        <p class="status" id="import-status"></p>
      </section>

      <section class="panel" id="panel-shapes" hidden>
        <h2>02 / ASSIGN ROLES</h2>
        <p class="hint">Mark each imported shape as a SHEET (stock to nest onto) or a PART (thing to nest), and set a quantity.</p>
        <table id="shapes-table">
          <thead>
            <tr>
              <th>#</th>
              <th>LAYER</th>
              <th>POINTS</th>
              <th>BBOX (W×H)</th>
              <th>PREVIEW</th>
              <th>ROLE</th>
              <th>QTY</th>
            </tr>
          </thead>
          <tbody id="shapes-body"></tbody>
        </table>
      </section>

      <section class="panel" id="panel-config" hidden>
        <h2>03 / CONFIGURE</h2>
        <div class="row">
          <label for="cfg-placement-type">PLACEMENT</label>
          <select id="cfg-placement-type">
            <option value="gravity">GRAVITY</option>
            <option value="box">BOX</option>
            <option value="convexhull">CONVEX HULL</option>
          </select>
          <label for="cfg-rotations">ROTATIONS</label>
          <input id="cfg-rotations" type="number" value="4" min="1" step="1" />
          <label for="cfg-population">POPULATION</label>
          <input id="cfg-population" type="number" value="10" min="2" step="1" />
        </div>
        <div class="row">
          <label for="cfg-mutation">MUTATION %</label>
          <input id="cfg-mutation" type="number" value="10" min="0" max="100" step="1" />
          <label for="cfg-generations">GENERATIONS</label>
          <input id="cfg-generations" type="number" value="5" min="1" step="1" />
          <label for="cfg-dominant">DOMINANT AREA</label>
          <input id="cfg-dominant" type="number" value="0.9" min="0.01" max="1" step="0.01" />
        </div>
        <div class="row">
          <label for="cfg-margin">MARGIN (mm)</label>
          <input id="cfg-margin" type="number" value="0" min="0" step="0.1" />
          <label for="cfg-spacing">SPACING (mm)</label>
          <input id="cfg-spacing" type="number" value="0" min="0" step="0.1" />
        </div>
        <div class="row">
          <button id="btn-run" class="primary">RUN NEST</button>
          <span class="status" id="run-status"></span>
        </div>
      </section>

      <section class="panel" id="panel-result" hidden>
        <h2>04 / RESULT</h2>
        <dl class="stats" id="result-stats"></dl>
        <div id="sheets"></div>
      </section>

      <section class="panel" id="panel-console">
        <h2>05 / CONSOLE</h2>
        <pre id="console-log"></pre>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
